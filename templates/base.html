<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gym Accounting{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 1rem 1.5rem; }
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
    }
    nav a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 1.25rem;
    }
    nav a:hover { text-decoration: underline; }
    nav .user { float: right; color: var(--muted); }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; }
    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: var(--border); }
    .messages { list-style: none; padding: 0; margin: 0 0 1rem; }
    .messages li { padding: 0.5rem 1rem; border-radius: 6px; margin-bottom: 0.25rem; }
    .success { background: rgba(63,185,80,0.2); color: var(--success); }
    .error { background: rgba(248,81,73,0.2); color: #f85149; }
    select, input[type="text"], input[type="month"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
    }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'accounting:home' %}">Home</a>
    <a href="{% url 'accounting:upload' %}">Upload</a>
    <a href="{% url 'accounting:metrics' %}">Metrics</a>
    <a href="{% url 'accounting:pl' %}">P&amp;L</a>
    <a href="{% url 'accounting:labels' %}">Labels</a>
    {% if user.is_authenticated %}
      <span class="user">{{ user.get_username }} · <a href="{% url 'logout' %}">Log out</a></span>
    {% else %}
      <span class="user"><a href="{% url 'login' %}">Log in</a></span>
    {% endif %}
  </nav>
  <main class="wrap">
    {% if messages %}
      <ul class="messages">
        {% for m in messages %}
          <li class="{{ m.tags }}">{{ m }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  {% block extra_js %}{% endblock %}
</body>
</html>
